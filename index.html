<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <!-- Brand -->
            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-fire me-1"></i> Top Content</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-users me-1"></i> People</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-book-open me-1"></i> Learning</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-briefcase me-1"></i> Jobs</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-gamepad me-1"></i> Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-mobile-alt me-1"></i> Get the
                            App</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-primary" href="#"><i
                                class="fas fa-user-plus me-1"></i> Join now</a></li>
                    <li class="nav-item"><a class="btn btn-outline-primary ms-2" href="#"><i
                                class="fas fa-sign-in-alt me-1"></i> Sign in</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 shadow-lg rounded overflow-hidden">

            <!-- Left Section -->
            <div class="col-lg-6 p-5 bg-light">
                <h2 class="mb-4 main-heading">Welcome to your professional community</h2>

                <button class="btn btn-outline-dark w-100 mb-3">
                    <i class="fab fa-google me-2"></i> Continue as S Y E D_
                </button>

                <button class="btn btn-outline-primary w-100 mb-3">
                    <i class="fab fa-microsoft me-2"></i> Continue as Wajhi
                </button>

                <button class="btn btn-outline-secondary w-100 mb-3">
                    <i class="fas fa-envelope me-2"></i> Sign in as S Y E D
                </button>

                <p class="small mt-3">
                    By clicking Continue to join or sign in, you agree to LinkedIn’s
                    <a href="#">User Agreement</a>, <a href="#">Privacy Policy</a>, and <a href="#">Cookie Policy</a>.
                </p>

                <p class="mt-3">New to LinkedIn? <a href="#">Join now</a></p>
            </div>

            <!-- Right Section -->
            <div class="col-lg-6 d-flex bg-white align-items-center justify-content-center p-4">
                <div class="illustration text-center w-100">

                    <img src="./pic/firstpicture.jpeg" alt="Profile" class="profile-pic mb-3" height=610px>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
